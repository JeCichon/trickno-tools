<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricknologic · Card Piano</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');
:root{--bg:#06040e;--gold:#c9a96e;--cw:78px;--ch:134px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'EB Garamond',serif;color:#ccc8b8;min-height:100vh;overflow-x:auto;}

/* ── TOP BAR ── */
#bar{position:sticky;top:0;z-index:80;background:rgba(6,4,14,.97);border-bottom:1px solid rgba(201,169,110,.1);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
#bar h1{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;color:var(--gold);opacity:.65;white-space:nowrap;}
.tb{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.14em;background:transparent;border:1px solid rgba(201,169,110,.22);color:var(--gold);padding:5px 12px;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.tb:hover{background:rgba(201,169,110,.08);border-color:rgba(201,169,110,.5);}
.tb.active{background:rgba(201,169,110,.12);border-color:rgba(201,169,110,.5);}
#set-nav{display:flex;align-items:center;gap:6px;padding:0 4px;border:1px solid rgba(201,169,110,.15);border-radius:3px;}
#set-name{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--gold);min-width:100px;text-align:center;}
.arr{font-size:14px;color:rgba(201,169,110,.5);cursor:pointer;padding:0 4px;background:none;border:none;transition:color .2s;}
.arr:hover{color:var(--gold);}
#bar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
#active-suit-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;color:rgba(201,169,110,.4);}

/* ── GRADIENT EDITOR ── */
#grad-editor{background:rgba(6,4,14,.96);border-bottom:1px solid rgba(201,169,110,.15);padding:10px 16px;display:none;align-items:center;gap:12px;flex-wrap:wrap;}
#grad-editor.show{display:flex;}
.ge-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.2em;color:rgba(201,169,110,.5);}
.ge-toggle{width:36px;height:18px;border-radius:9px;background:rgba(201,169,110,.15);border:1px solid rgba(201,169,110,.2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.ge-toggle.on{background:rgba(201,169,110,.35);}
.ge-knob{width:14px;height:14px;border-radius:50%;background:var(--gold);position:absolute;top:1px;left:1px;transition:left .2s;opacity:.5;}
.ge-toggle.on .ge-knob{left:19px;opacity:1;}
#ge-start,#ge-end{width:32px;height:28px;border:2px solid rgba(201,169,110,.3);border-radius:3px;cursor:pointer;background:none;}
#ge-blend{font-family:'Cinzel',serif;font-size:9px;background:rgba(0,0,0,.5);border:1px solid rgba(201,169,110,.2);color:var(--gold);padding:4px 8px;border-radius:2px;cursor:pointer;}
#ge-opacity-wrap{display:flex;align-items:center;gap:5px;}
#ge-opacity{width:70px;accent-color:var(--gold);}
#ge-preview{flex:1;height:20px;border-radius:3px;min-width:100px;background:linear-gradient(to right, #c9a96e, #c9a96e);}

/* ── KEYBOARD POPUP ── */
#kb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;align-items:center;justify-content:center;}
#kb-overlay.show{display:flex;}
#kb-box{background:linear-gradient(150deg,#130f22,#09071a);border:1px solid rgba(201,169,110,.28);border-radius:8px;padding:22px 26px;max-width:680px;width:92vw;max-height:88vh;overflow-y:auto;}
#kb-box h2{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.25em;color:var(--gold);margin-bottom:14px;font-weight:600;}
#kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:14px;}
.kb-row{display:flex;align-items:center;gap:7px;padding:5px 8px;background:rgba(0,0,0,.3);border-radius:3px;border:1px solid rgba(201,169,110,.07);}
.kb-key{font-family:'Cinzel',serif;font-size:11px;font-weight:700;color:var(--gold);min-width:20px;text-align:center;}
.kb-card{font-size:10px;color:#6a6050;flex:1;}
.kb-note{font-size:9px;color:#3a3028;font-style:italic;}
.kb-suit-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.kb-suit-tab{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;padding:4px 10px;border:1px solid rgba(201,169,110,.2);border-radius:2px;cursor:pointer;color:rgba(201,169,110,.5);transition:all .2s;}
.kb-suit-tab.active{border-color:rgba(201,169,110,.55);color:var(--gold);background:rgba(201,169,110,.08);}

/* ── COLOR PICKER MODAL ── */
#cp-modal{position:fixed;z-index:300;background:linear-gradient(150deg,#130f22,#09071a);border:1px solid rgba(201,169,110,.3);border-radius:8px;padding:16px;box-shadow:0 16px 50px rgba(0,0,0,.9);display:none;min-width:220px;}
#cp-modal.show{display:block;}
#cp-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:var(--gold);margin-bottom:10px;}
#cp-input{width:100%;height:50px;border:none;border-radius:4px;cursor:pointer;background:none;}
.cp-row{display:flex;gap:8px;margin-top:10px;}
#cp-preview{flex:1;height:36px;border-radius:4px;border:1px solid rgba(255,255,255,.1);}
#cp-rgb{font-size:10px;color:#6a6050;margin-top:6px;letter-spacing:.08em;}
.cp-btns{display:flex;gap:6px;margin-top:10px;}
.cp-btn{flex:1;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;padding:6px;border:1px solid rgba(201,169,110,.22);background:transparent;color:var(--gold);cursor:pointer;border-radius:2px;transition:all .2s;}
.cp-btn:hover{background:rgba(201,169,110,.08);}

/* ── CONTENT ── */
#content{padding:16px 16px 60px;}

/* ── SUIT ROW ── */
.suit-row{margin-bottom:22px;position:relative;}
.suit-row.dimmed{opacity:.3;pointer-events:none;}
.suit-row.dimmed.grad-active{opacity:1;pointer-events:auto;}
.suit-head{display:flex;align-items:center;gap:0;margin-bottom:10px;}
.suit-trigger{display:flex;align-items:center;gap:8px;padding:6px 14px 6px 10px;background:rgba(0,0,0,.4);border:1px solid rgba(201,169,110,.15);border-radius:4px;cursor:pointer;transition:all .2s;flex-shrink:0;margin-right:12px;}
.suit-trigger:hover{border-color:rgba(201,169,110,.4);background:rgba(201,169,110,.06);}
.suit-trigger.grad-open{border-color:rgba(201,169,110,.55);background:rgba(201,169,110,.1);}
.suit-pip{font-size:16px;}
.suit-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;color:var(--gold);font-weight:600;}
.suit-kb{font-size:8px;letter-spacing:.15em;color:#3a3028;margin-left:4px;}
.suit-kb.active-kb{color:rgba(201,169,110,.5);}

/* Cards row */
.cards-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;}
.cards-row::-webkit-scrollbar{height:3px;}
.cards-row::-webkit-scrollbar-track{background:transparent;}
.cards-row::-webkit-scrollbar-thumb{background:rgba(201,169,110,.2);border-radius:2px;}

/* ── CARD ── */
.card-key{
  width:var(--cw);min-width:var(--cw);height:var(--ch);
  border-radius:6px;position:relative;cursor:pointer;
  display:flex;flex-direction:column;justify-content:space-between;
  padding:6px 5px 5px;
  border:2px solid rgba(255,255,255,.1);
  transition:transform .08s,box-shadow .08s,border-color .15s;
  overflow:hidden;
  user-select:none;
}
.card-key:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.25);}
.card-key.playing{transform:translateY(-5px)!important;box-shadow:0 0 24px currentColor!important;border-color:rgba(255,255,255,.8)!important;z-index:10;}
.card-key.kb-active{border-color:rgba(255,255,255,.6)!important;}

/* Gradient overlay */
.grad-overlay{position:absolute;inset:0;pointer-events:none;border-radius:5px;}

/* Card image layer */
.card-img{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;border-radius:5px;pointer-events:none;}

/* Card text */
.ck-top{position:relative;z-index:2;}
.ck-num{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.12em;opacity:.8;display:block;}
.ck-suit{font-size:6px;letter-spacing:.1em;opacity:.55;display:block;}
.ck-bot{position:relative;z-index:2;text-align:center;}
.ck-name{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.04em;font-weight:600;line-height:1.2;display:block;}
.ck-words{font-size:6px;font-style:italic;opacity:.65;display:block;line-height:1.3;margin-top:1px;}
.ck-key-badge{position:absolute;top:4px;right:4px;z-index:3;font-family:'Cinzel',serif;font-size:7px;font-weight:700;background:rgba(0,0,0,.5);padding:1px 4px;border-radius:2px;opacity:.7;}

/* ── MISC MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;display:none;align-items:center;justify-content:center;}
#modal-overlay.show{display:flex;}
#modal-box{background:linear-gradient(150deg,#130f22,#09071a);border:1px solid rgba(201,169,110,.28);border-radius:8px;width:min(400px,90vw);padding:22px 24px;box-shadow:0 24px 70px rgba(0,0,0,.9);}
#modal-box h2{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.25em;color:var(--gold);margin-bottom:14px;font-weight:600;}
.m-input{width:100%;font-family:'Cinzel',serif;font-size:12px;background:rgba(0,0,0,.5);border:1px solid rgba(201,169,110,.2);color:#ccc8b8;padding:8px 12px;border-radius:3px;outline:none;margin-bottom:14px;}
.m-input:focus{border-color:rgba(201,169,110,.45);}
.m-btns{display:flex;gap:8px;justify-content:flex-end;}
.m-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;background:transparent;border:1px solid rgba(201,169,110,.22);color:var(--gold);padding:7px 16px;cursor:pointer;border-radius:2px;transition:all .2s;}
.m-btn:hover{background:rgba(201,169,110,.08);}
.m-btn.go{border-color:rgba(201,169,110,.5);background:rgba(201,169,110,.07);}
</style>
</head>

<div id="bar">

    <a href="tarot_sequencer.html" style="font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;color:rgba(201,169,110,.3);text-decoration:none;padding:4px 8px;border:1px solid rgba(201,169,110,.1);border-radius:2px;transition:all .2s;" onmouseover="this.style.color='#c9a96e';this.style.borderColor='rgba(201,169,110,.3)'" onmouseout="this.style.color='rgba(201,169,110,.3)';this.style.borderColor='rgba(201,169,110,.1)'">↩ Sequencer</a>

</div>

<!-- GRADIENT EDITOR (shown above active suit) -->
<div id="grad-editor">

  <div id="ge-preview"></div>
  <input type="color" id="ge-end" value="#c9a96e" title="End color"/>
  <select id="ge-blend" title="Blend mode">
    <option value="normal">Normal</option>
    <option value="multiply">Multiply</option>
    <option value="screen">Screen</option>
    <option value="overlay">Overlay</option>
    <option value="hard-light">Hard Light</option>
    <option value="color-dodge">Color Dodge</option>
  </select>
  <div id="ge-opacity-wrap">
    <span class="ge-label">OPACITY</span>
    <input type="range" id="ge-opacity" min="0" max="100" value="30"/>
    <span id="ge-opacity-val" class="ge-label">30%</span>
  </div>
  <button class="tb" id="ge-close">Close</button>
</div>

<!-- KEYBOARD POPUP -->
<div id="kb-overlay">
  <div id="kb-box">
    <h2>KEYBOARD MAP</h2>
    <div class="kb-suit-tabs" id="kb-suit-tabs"></div>
    <div id="kb-grid"></div>
    <button class="tb" onclick="document.getElementById('kb-overlay').classList.remove('show')">Close</button>
  </div>
</div>

<!-- COLOR PICKER -->
<div id="cp-modal">
  <div id="cp-title">CARD COLOR</div>
  <input type="color" id="cp-input"/>
  <div id="cp-rgb"></div>
  <div id="cp-preview"></div>
  <div class="cp-btns">
    <button class="cp-btn" id="cp-reset">↺ Reset</button>
    <button class="cp-btn" id="cp-apply">Apply</button>
    <button class="cp-btn" id="cp-cancel">Cancel</button>
  </div>
</div>

<!-- GENERIC MODAL -->
<div id="modal-overlay">
  <div id="modal-box">
    <h2 id="modal-title"></h2>
    <input type="text" class="m-input" id="modal-input" placeholder=""/>
    <div class="m-btns" id="modal-btns"></div>
  </div>
</div>

<!-- CONTENT -->
<div id="content"></div>

  wands:{on:false,start:'#e63946',end:'#ff9900',blend:'normal',opacity:30},

function buildPianoColors(){
  const cols={};
  BASE_CARDS.forEach((card,i)=>{
    const [r,g,b]=PIANO_CHROMO[i%PIANO_CHROMO.length];
    cols[card.n]={r,g,b};
  });
  return cols;
}

function getCardColor(n){
  const set=sets[activeSetIdx];
  if(set.colors[n]) return set.colors[n];
  const base=BASE_CARDS.find(c=>c.n===n);
  return {r:base.r,g:base.g,b:base.b};
}

// Returns the perceptually effective color — base color blended with gradient if on.
// This is what both rendering AND audio should use.
function getEffectiveColor(n){
  const base=getCardColor(n);
  const card=BASE_CARDS.find(c=>c.n===n);
  const grad=gradients[card.suit];
  if(!grad||!grad.on) return base;

  // Find position of this card within its suit
  const suitCards=BASE_CARDS.filter(c=>c.suit===card.suit);
  const ci=suitCards.findIndex(c=>c.n===n);
  const t=suitCards.length>1?ci/(suitCards.length-1):0;

  // Interpolate gradient color
  const sc=hexToRgb(grad.start),ec=hexToRgb(grad.end);
  const gr={
    r:Math.round(sc.r+(ec.r-sc.r)*t),
    g:Math.round(sc.g+(ec.g-sc.g)*t),
    b:Math.round(sc.b+(ec.b-sc.b)*t),
  };

  const op=grad.opacity/100;
  const blend=grad.blend;

  // Blend each channel
  function blendCh(b,g){
    let blended;
    switch(blend){
      case 'multiply':  blended=(b/255)*(g/255)*255; break;
      case 'screen':    blended=(1-(1-b/255)*(1-g/255))*255; break;
      case 'overlay':   blended=b<128?(2*b/255*g/255)*255:(1-2*(1-b/255)*(1-g/255))*255; break;
      case 'hard-light':blended=g<128?(2*g/255*b/255)*255:(1-2*(1-g/255)*(1-b/255))*255; break;
      case 'color-dodge':blended=g===255?255:Math.min(255,(b/255)/(1-g/255)*255); break;
      default:          blended=g; // normal
    }
    // Mix with opacity
    return Math.round(b*(1-op)+blended*op);
  }

  return {
    r:Math.max(0,Math.min(255,blendCh(base.r,gr.r))),
    g:Math.max(0,Math.min(255,blendCh(base.g,gr.g))),
    b:Math.max(0,Math.min(255,blendCh(base.b,gr.b))),
  };
}

// AUDIO ENGINE
// ═══════════════════════════════════════
let ctx=null;
const active=new Map(); // n → {osc,gain,osc2,gain2,cmyk,sVol}

function getCtx(){
  if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();
  if(ctx.state==='suspended')ctx.resume();
  return ctx;
}

function rgbToFreq(r,g,b){
  const rr=r/255,gg=g/255,bb=b/255;
  const mx=Math.max(rr,gg,bb),mn=Math.min(rr,gg,bb),d=mx-mn;
  let h=0,s=mx===0?0:d/mx,v=mx;
  if(d){if(mx===rr)h=((gg-bb)/d+6)%6;else if(mx===gg)h=(bb-rr)/d+2;else h=(rr-gg)/d+4;h*=60;}
  if(v<.04)return 174.6;if(s<.12)return 400+v*200;
  const ref=[[0,355],[23,415],[38,453],[55,466],[84,494],[120,512],[174,554],[180,523],[210,587],[241,622],[256,659],[273,698],[300,349],[360,355]];
  for(let i=0;i<ref.length-1;i++){const[h0,f0]=ref[i],[h1,f1]=ref[i+1];if(h>=h0&&h<=h1)return f0+(h-h0)/(h1-h0)*(f1-f0);}
  return 440;
}

function toCMYK(r,g,b){
  const rr=r/255,gg=g/255,bb=b/255,k=1-Math.max(rr,gg,bb);
  if(k>=1)return{c:0,m:0,y:0,k:1};
  return{c:(1-rr-k)/(1-k),m:(1-gg-k)/(1-k),y:(1-bb-k)/(1-k),k};
}

function playCard(n){
  if(active.has(n))return;
  const col=getEffectiveColor(n);  // uses gradient-blended color for audio
  const card=BASE_CARDS.find(c=>c.n===n);
  const a=getCtx();
  const freq=rgbToFreq(col.r,col.g,col.b);
  const cmyk=toCMYK(col.r,col.g,col.b);

  const waves={major:'sine',wands:'triangle',cups:'sine',swords:'sawtooth',disks:'square'};
  const A=.05+cmyk.c*.4, D=.05+cmyk.m*.3;
  const sVol=.3+cmyk.y*.5, peak=.32;
  const now=a.currentTime;

  const osc=a.createOscillator(),gain=a.createGain();
  osc.type=waves[card.suit]||'sine';
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(0,now);
  gain.gain.linearRampToValueAtTime(peak,now+A);
  gain.gain.linearRampToValueAtTime(peak*sVol,now+A+D);
  osc.connect(gain);gain.connect(a.destination);osc.start(now);

  let osc2=null,gain2=null;
  if(card.suit==='major'){
    osc2=a.createOscillator();gain2=a.createGain();
    osc2.type='triangle';osc2.frequency.value=freq*2;
    gain2.gain.setValueAtTime(0,now);
    gain2.gain.linearRampToValueAtTime(peak*.2,now+A);
    gain2.gain.linearRampToValueAtTime(peak*.1,now+A+D);
    osc2.connect(gain2);gain2.connect(a.destination);osc2.start(now);
  }

  active.set(n,{osc,gain,osc2,gain2,cmyk,sVol:peak*sVol});
  // Visual
  document.querySelector(`.card-key[data-n="${n}"]`)?.classList.add('playing');
}

function stopCard(n){
  const e=active.get(n);if(!e)return;
  const a=getCtx();
  const R=.08+e.cmyk.k*.5;
  const now=a.currentTime;
  e.gain.gain.cancelScheduledValues(now);
  e.gain.gain.setValueAtTime(e.gain.gain.value,now);
  e.gain.gain.linearRampToValueAtTime(0,now+R);
  try{e.osc.stop(now+R+.05);}catch(err){}
  if(e.osc2){
    e.gain2.gain.cancelScheduledValues(now);
    e.gain2.gain.setValueAtTime(e.gain2.gain.value,now);
    e.gain2.gain.linearRampToValueAtTime(0,now+R);
    try{e.osc2.stop(now+R+.05);}catch(err){}
  }
  active.delete(n);
  document.querySelector(`.card-key[data-n="${n}"]`)?.classList.remove('playing');
}

function stopAll(){active.forEach((_,n)=>stopCard(n));}

function render(){
  const content=document.getElementById('content');
  content.innerHTML='';
  SUIT_ORDER.forEach(suit=>{
    const info=SUIT_INFO[suit];
    const cards=BASE_CARDS.filter(c=>c.suit===suit);
    const grad=gradients[suit];
    const isActiveSuit=suit===activeSuit;
    const isGradOpen=suit===activeGradSuit;

    const row=document.createElement('div');
    row.className='suit-row'+(activeGradSuit&&!isGradOpen?' dimmed':'')+(isGradOpen?' grad-active':'');

    // Suit head
    const head=document.createElement('div');
    head.className='suit-head';
    const trigger=document.createElement('div');
    trigger.className='suit-trigger'+(isGradOpen?' grad-open':'');
    trigger.innerHTML=`
      <span class="suit-pip">${info.pip}</span>
      <div>
        <div class="suit-title" style="color:${info.color}">${info.label}</div>
        <div class="suit-kb ${isActiveSuit?'active-kb':''}">${isActiveSuit?'KEYBOARD ACTIVE — TAB to change':''}</div>
      </div>
    `;
    trigger.addEventListener('click',()=>toggleGrad(suit));
    head.appendChild(trigger);
    row.appendChild(head);

    // Cards
    const cardsRow=document.createElement('div');
    cardsRow.className='cards-row';
    const keys=suitKeys(suit);

    cards.forEach((card,ci)=>{
      const col=getEffectiveColor(card.n); // gradient-blended — drives both color AND audio
      const fg=`rgb(${255-col.r},${255-col.g},${255-col.b})`;
      const bg=`rgb(${col.r},${col.g},${col.b})`;
      const keyLabel=keys[ci]||'';

      // Gradient step color
      let gradOverlayStyle='';
      if(grad.on){
        // Gradient is now baked into the card background color for audio accuracy.
        // Overlay div just shows a subtle active indicator border.
        gradOverlayStyle=`border:2px solid rgba(255,255,255,.15);border-radius:5px;`;
      }

      const el=document.createElement('div');
      el.className='card-key';
      el.dataset.n=card.n;
      el.style.background=bg;
      el.style.color=fg;
      el.style.boxShadow=`0 3px 12px rgba(${col.r},${col.g},${col.b},.25)`;
      el.style.borderColor=`rgba(${col.r},${col.g},${col.b},.4)`;

      const imgSrc=cardImages[card.n];
      el.innerHTML=`
        ${imgSrc?`<img class="card-img" src="${imgSrc}" alt="" draggable="false"/>`:''}
        <div class="grad-overlay" style="${gradOverlayStyle}"></div>
        <div class="ck-top">
          <span class="ck-num" style="color:${fg}">${suit==='major'?card.idx:card.idx}</span>
          <span class="ck-suit" style="color:${fg}">${info.label.split('·')[0].trim()}</span>
        </div>
        <div class="ck-bot">
          <span class="ck-name" style="color:${fg}">${card.name}</span>
          <span class="ck-words" style="color:${fg}">${card.adj}·${card.noun}</span>
        </div>
        ${keyLabel?`<div class="ck-key-badge" style="color:${fg}">${keyLabel.toUpperCase()}</div>`:''}
      `;

      // Events
      el.addEventListener('mousedown',e=>{
        e.preventDefault();
        playCard(card.n);
        isDragging=true;lastDragN=card.n;
      });
      el.addEventListener('mouseup',()=>stopCard(card.n));
      el.addEventListener('mouseleave',()=>{if(isDragging)stopCard(card.n);});
      el.addEventListener('mouseenter',()=>{
        if(isDragging&&lastDragN!==card.n){
          playCard(card.n);lastDragN=card.n;
        }
      });

      // Right-click → color picker
      el.addEventListener('contextmenu',e=>{e.preventDefault();openColorPicker(card.n,e.clientX,e.clientY);});

      cardsRow.appendChild(el);
    });

    row.appendChild(cardsRow);
    content.appendChild(row);
  });

  updateSetUI();
  updateActiveSuitLabel();
}

const pressedKeys=new Set();
const keyToCard=new Map();

function buildKeyMap(){
  keyToCard.clear();
  const cards=BASE_CARDS.filter(c=>c.suit===activeSuit);
  const keys=suitKeys(activeSuit);
  cards.forEach((card,i)=>{if(keys[i])keyToCard.set(keys[i],card.n);});
}

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  const k=e.key.toLowerCase();
  if(k==='tab'){e.preventDefault();cycleSuit();return;}
  if(pressedKeys.has(k))return;
  pressedKeys.add(k);
  const n=keyToCard.get(k);
  if(n!==undefined)playCard(n);
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  pressedKeys.delete(k);
  const n=keyToCard.get(k);
  if(n!==undefined)stopCard(n);
});

function cycleSuit(){
  const idx=SUIT_ORDER.indexOf(activeSuit);
  activeSuit=SUIT_ORDER[(idx+1)%SUIT_ORDER.length];
  buildKeyMap();
  render();
  renderKbPopup();
}

function toggleGrad(suit){
  activeGradSuit=activeGradSuit===suit?null:suit;
  if(activeGradSuit){
    const g=gradients[suit];
    const info=SUIT_INFO[suit];
    document.getElementById('ge-suit-label').textContent=info.label.toUpperCase();
    document.getElementById('ge-start').value=g.start;
    document.getElementById('ge-end').value=g.end;
    document.getElementById('ge-blend').value=g.blend;
    document.getElementById('ge-opacity').value=g.opacity;
    document.getElementById('ge-opacity-val').textContent=g.opacity+'%';
    document.getElementById('ge-toggle').className='ge-toggle'+(g.on?' on':'');
    updateGradPreview(suit);
    document.getElementById('grad-editor').classList.add('show');
  } else {
    document.getElementById('grad-editor').classList.remove('show');
  }
  render();
}

function updateGradPreview(suit){
  const g=gradients[suit||activeGradSuit];
  if(!g)return;
  document.getElementById('ge-preview').style.background=`linear-gradient(to right, ${g.start}, ${g.end})`;
}

document.getElementById('ge-toggle').addEventListener('click',()=>{
  if(!activeGradSuit)return;
  gradients[activeGradSuit].on=!gradients[activeGradSuit].on;
  document.getElementById('ge-toggle').className='ge-toggle'+(gradients[activeGradSuit].on?' on':'');
  render();
});

['ge-start','ge-end'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    if(!activeGradSuit)return;
    if(id==='ge-start')gradients[activeGradSuit].start=e.target.value;
    else gradients[activeGradSuit].end=e.target.value;
    updateGradPreview(activeGradSuit);
    render();
  });
});

document.getElementById('ge-blend').addEventListener('change',e=>{
  if(activeGradSuit)gradients[activeGradSuit].blend=e.target.value;render();
});
document.getElementById('ge-opacity').addEventListener('input',e=>{
  if(!activeGradSuit)return;
  gradients[activeGradSuit].opacity=parseInt(e.target.value);
  document.getElementById('ge-opacity-val').textContent=e.target.value+'%';
  render();
});
document.getElementById('ge-close').addEventListener('click',()=>{activeGradSuit=null;document.getElementById('grad-editor').classList.remove('show');render();});

  const col=getCardColor(n);
  cpOrigColor={...col};
  const hex=rgbToHex(col.r,col.g,col.b);
  const inp=document.getElementById('cp-input');
  inp.value=hex;
  document.getElementById('cp-preview').style.background=hex;
  document.getElementById('cp-rgb').textContent=`R${col.r} G${col.g} B${col.b}`;
  document.getElementById('cp-title').textContent=BASE_CARDS.find(c=>c.n===n)?.name||'Card';
  // Position near click
  const left=Math.min(mx,window.innerWidth-240);
  const top=Math.min(my,window.innerHeight-200);
  cpModal.style.left=left+'px';cpModal.style.top=top+'px';
  cpModal.classList.add('show');
}

document.getElementById('cp-input').addEventListener('input',e=>{
  const hex=e.target.value;
  if(!/^#[0-9a-f]{6}$/i.test(hex))return;
  const {r,g,b}=hexToRgb(hex);
  document.getElementById('cp-preview').style.background=hex;
  document.getElementById('cp-rgb').textContent=`R${r} G${g} B${b}`;
  // Live tone preview
  const osc_id='cp_preview';
  stopCard(osc_id);
  // Quick play then stop
  const a=getCtx();
  const freq=rgbToFreq(r,g,b);
  const osc=a.createOscillator(),gain=a.createGain();
  osc.type='sine';osc.frequency.value=freq;
  gain.gain.setValueAtTime(0,a.currentTime);
  gain.gain.linearRampToValueAtTime(.2,a.currentTime+.05);
  gain.gain.linearRampToValueAtTime(0,a.currentTime+.3);
  osc.connect(gain);gain.connect(a.destination);
  osc.start();osc.stop(a.currentTime+.35);
});

document.getElementById('cp-apply').addEventListener('click',()=>{
  if(cpCardN===null)return;
  const hex=document.getElementById('cp-input').value;
  const {r,g,b}=hexToRgb(hex);
  const set=sets[activeSetIdx];
  if(set.locked){alert('Cannot edit a locked set. Duplicate it first.');return;}
  if(!set.colors[cpCardN])set.colors[cpCardN]={};
  set.colors[cpCardN]={r,g,b};
  cpModal.classList.remove('show');
  saveState();render();
});

document.getElementById('cp-reset').addEventListener('click',()=>{
  if(cpCardN===null)return;
  const set=sets[activeSetIdx];
  if(set.locked){alert('Cannot edit a locked set.');return;}
  delete set.colors[cpCardN];
  const base=BASE_CARDS.find(c=>c.n===cpCardN);
  document.getElementById('cp-input').value=rgbToHex(base.r,base.g,base.b);
  document.getElementById('cp-preview').style.background=rgbToHex(base.r,base.g,base.b);
  saveState();render();
  cpModal.classList.remove('show');
});

document.getElementById('cp-cancel').addEventListener('click',()=>{cpModal.classList.remove('show');});
document.addEventListener('mousedown',e=>{if(!cpModal.contains(e.target))cpModal.classList.remove('show');});

// ═══════════════════════════════════════
// CARD SETS
// ═══════════════════════════════════════
function updateSetUI(){
  const set=sets[activeSetIdx];
  document.getElementById('set-name').textContent=set.name+(set.locked?' 🔒':'');
  document.getElementById('rename-set-btn').disabled=set.locked;
  document.getElementById('rename-set-btn').style.opacity=set.locked?.4:1;
}

document.getElementById('prev-set').addEventListener('click',()=>{
  activeSetIdx=(activeSetIdx-1+sets.length)%sets.length;render();
});
document.getElementById('next-set').addEventListener('click',()=>{
  activeSetIdx=(activeSetIdx+1)%sets.length;render();
});

document.getElementById('dup-set-btn').addEventListener('click',()=>{
  const src=sets[activeSetIdx];
  const newSet={id:'set_'+Date.now(),name:src.name+' Copy',locked:false,colors:JSON.parse(JSON.stringify(src.colors))};
  sets.push(newSet);
  activeSetIdx=sets.length-1;
  saveState();render();
});

document.getElementById('rename-set-btn').addEventListener('click',()=>{
  const set=sets[activeSetIdx];
  if(set.locked)return;
  openModal('Rename Set',set.name,(val)=>{set.name=val;saveState();render();});
});

// ═══════════════════════════════════════
// KEYBOARD POPUP
// ═══════════════════════════════════════
document.getElementById('kb-btn').addEventListener('click',()=>{
  renderKbPopup();
  document.getElementById('kb-overlay').classList.add('show');
});

function renderKbPopup(){
  // Suit tabs
  const tabs=document.getElementById('kb-suit-tabs');
  tabs.innerHTML='';
  SUIT_ORDER.forEach(suit=>{
    const info=SUIT_INFO[suit];
    const btn=document.createElement('div');
    btn.className='kb-suit-tab'+(suit===activeSuit?' active':'');
    btn.textContent=`${info.pip} ${info.label}`;
    btn.addEventListener('click',()=>{activeSuit=suit;buildKeyMap();renderKbPopup();render();});
    tabs.appendChild(btn);
  });

  // Key grid
  const grid=document.getElementById('kb-grid');
  grid.innerHTML='';
  const cards=BASE_CARDS.filter(c=>c.suit===activeSuit);
  const keys=suitKeys(activeSuit);
  cards.forEach((card,i)=>{
    const k=keys[i];if(!k)return;
    const col=getEffectiveColor(card.n);
    const row=document.createElement('div');
    row.className='kb-row';
    row.style.borderColor=`rgba(${col.r},${col.g},${col.b},.25)`;
    const freq=rgbToFreq(col.r,col.g,col.b);
    row.innerHTML=`
      <div class="kb-key" style="color:rgb(${col.r},${col.g},${col.b})">${k.toUpperCase()}</div>
      <div class="kb-card">${card.name}</div>
      <div class="kb-note">${freq.toFixed(0)}hz</div>
    `;
    grid.appendChild(row);
  });
}

// ═══════════════════════════════════════
// GENERIC MODAL
// ═══════════════════════════════════════
function openModal(title,defaultVal,onConfirm){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-input').value=defaultVal||'';
  const btns=document.getElementById('modal-btns');
  btns.innerHTML='';
  const cancel=document.createElement('button');cancel.className='m-btn';cancel.textContent='Cancel';
  cancel.addEventListener('click',()=>document.getElementById('modal-overlay').classList.remove('show'));
  const ok=document.createElement('button');ok.className='m-btn go';ok.textContent='Confirm';
  ok.addEventListener('click',()=>{
    onConfirm(document.getElementById('modal-input').value.trim());
    document.getElementById('modal-overlay').classList.remove('show');
  });
  btns.appendChild(cancel);btns.appendChild(ok);
  document.getElementById('modal-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('modal-input').focus(),50);
}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('show');});

// ═══════════════════════════════════════
// SAVE / LOAD (IndexedDB for sets)
// ═══════════════════════════════════════
function saveState(){
  try{
    // Don't save locked sets (they're built-in)
    const toSave=sets.filter(s=>!s.locked);
    localStorage.setItem('trico_piano_sets',JSON.stringify({sets:toSave,activeSetIdx}));
  }catch(e){}
}

function loadState(){
  try{
    const raw=localStorage.getItem('trico_piano_sets');
    if(!raw)return;
    const d=JSON.parse(raw);
    // Merge custom sets with built-ins
    const builtIn=sets.filter(s=>s.locked);
    const custom=(d.sets||[]).filter(s=>!s.locked);
    sets=[...builtIn,...custom];
    activeSetIdx=Math.min(d.activeSetIdx||0,sets.length-1);
  }catch(e){}
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
loadState();
buildKeyMap();
// Load Supabase card data first, then images (which triggers render)
loadSupabaseCards().then(()=>loadImages());
</script>
