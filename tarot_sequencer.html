<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tricknologic · Sequencer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');
:root{--bg:#06040e;--bg2:#0d0a1e;--bg3:#150f28;--gold:#c9a96e;--gf:rgba(201,169,110,.12);--border:rgba(201,169,110,.15);--text:#ccc8b8;--dim:#3a3028;--sw:42px;--sh:58px;--dsh:74px;--tlw:168px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'EB Garamond',serif;color:var(--text);min-height:100vh;}

/* TOP BAR */
#bar{position:sticky;top:0;z-index:80;background:rgba(6,4,14,.97);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
#bar h1{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.3em;color:var(--gold);opacity:.65;white-space:nowrap;}
.tb{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.14em;background:transparent;border:1px solid rgba(201,169,110,.22);color:var(--gold);padding:5px 11px;cursor:pointer;border-radius:2px;transition:all .2s;white-space:nowrap;}
.tb:hover{background:var(--gf);border-color:rgba(201,169,110,.5);}
.tb.active{background:rgba(201,169,110,.18);border-color:var(--gold);}
.tb:disabled{opacity:.25;cursor:default;}
.tb:disabled:hover{background:transparent;border-color:rgba(201,169,110,.22);}
#play-btn{border-color:rgba(100,220,120,.35);color:rgba(100,220,120,.8);}
#play-btn:hover{background:rgba(100,220,120,.08);}
#play-btn.playing{background:rgba(100,220,120,.14);border-color:rgba(100,220,120,.7);color:rgba(140,255,160,1);}
#stop-btn{border-color:rgba(220,100,100,.3);color:rgba(220,100,100,.7);}
#stop-btn:hover{background:rgba(220,100,100,.08);}
#circle-btn{border-color:rgba(140,120,220,.35);color:rgba(180,160,240,.7);}
#circle-btn:hover{background:rgba(140,120,220,.08);}
#circle-btn.active{background:rgba(140,120,220,.14);border-color:rgba(180,160,240,.6);color:rgba(200,180,255,1);}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}
.ctl-group{display:flex;align-items:center;gap:5px;}
.ctl-lbl{font-family:'Cinzel',serif;font-size:7.5px;letter-spacing:.2em;color:rgba(201,169,110,.35);}
.ctl-val{font-family:'Cinzel',serif;font-size:14px;color:var(--gold);min-width:34px;text-align:center;}
.ctl-btn{width:20px;height:20px;font-size:12px;background:rgba(0,0,0,.4);border:1px solid var(--border);color:var(--gold);cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.ctl-btn:hover{background:var(--gf);}
.step-preset{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;padding:3px 6px;border:1px solid var(--border);background:transparent;color:rgba(201,169,110,.45);cursor:pointer;border-radius:2px;transition:all .15s;}
.step-preset:hover,.step-preset.on{border-color:var(--gold);color:var(--gold);background:var(--gf);}
#sb-status{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;color:rgba(201,169,110,.3);}
#bar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.nav-link{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;color:rgba(201,169,110,.3);text-decoration:none;padding:4px 8px;border:1px solid rgba(201,169,110,.1);border-radius:2px;transition:all .2s;}
.nav-link:hover{color:var(--gold);border-color:var(--border);}

/* TRACKS */
#tracks-outer{overflow-x:auto;padding-bottom:220px;}
#tracks-outer::-webkit-scrollbar{height:4px;}
#tracks-outer::-webkit-scrollbar-thumb{background:rgba(201,169,110,.15);border-radius:2px;}
.track-row{display:flex;align-items:stretch;border-bottom:1px solid rgba(201,169,110,.06);min-width:max-content;}
.track-row:hover{background:rgba(255,255,255,.01);}
.track-header{width:var(--tlw);min-width:var(--tlw);display:flex;align-items:center;gap:6px;padding:8px 10px;border-right:1px solid var(--border);flex-shrink:0;position:sticky;left:0;background:rgba(6,4,14,.98);z-index:10;}
.track-pip{font-size:15px;flex-shrink:0;line-height:1;}
.track-info{flex:1;min-width:0;}
.track-suit-btn{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;color:var(--gold);cursor:pointer;background:none;border:none;padding:0;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:104px;display:block;}
.track-suit-btn:hover{text-decoration:underline;}
.track-unassigned{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.1em;color:var(--dim);display:block;cursor:pointer;}
.track-unassigned:hover{color:rgba(201,169,110,.5);}
.track-vol{width:50px;height:3px;accent-color:var(--gold);cursor:pointer;margin-top:3px;}
.oct-row{display:flex;align-items:center;gap:3px;margin-top:3px;}
.oct-lbl{font-family:'Cinzel',serif;font-size:6.5px;letter-spacing:.15em;color:rgba(201,169,110,.35);}
.oct-btn{width:13px;height:13px;font-size:9px;line-height:1;background:rgba(0,0,0,.4);border:1px solid var(--border);color:var(--gold);cursor:pointer;border-radius:2px;display:flex;align-items:center;justify-content:center;padding:0;}
.oct-btn:hover{background:var(--gf);}
.oct-val{font-family:'Cinzel',serif;font-size:8px;color:var(--gold);min-width:16px;text-align:center;}
.grad-btn{width:22px;height:14px;border-radius:2px;border:1px solid var(--border);cursor:pointer;margin-top:3px;background:linear-gradient(to right,#444,#888);transition:border-color .15s;}
.grad-btn:hover{border-color:var(--gold);}
.grad-btn.on{border-color:rgba(255,255,255,.6);box-shadow:0 0 6px rgba(255,255,255,.25);}

#grad-popup{position:fixed;z-index:300;background:linear-gradient(150deg,#130f22,#09071a);border:1px solid rgba(201,169,110,.3);border-radius:6px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,.95);display:none;min-width:220px;}
#grad-popup.show{display:block;}
#gp-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
#gp-title{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.18em;color:var(--gold);flex:1;}
.gp-toggle{width:30px;height:16px;border-radius:8px;background:rgba(255,255,255,.08);border:1px solid var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
.gp-toggle .gp-knob{width:12px;height:12px;border-radius:50%;background:rgba(201,169,110,.4);position:absolute;top:1px;left:1px;transition:transform .2s,background .2s;}
.gp-toggle.on{background:rgba(100,220,140,.18);border-color:rgba(100,220,140,.5);}
.gp-toggle.on .gp-knob{transform:translateX(14px);background:rgba(140,255,160,.9);}
#gp-row{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
#gp-row input[type=color]{width:30px;height:24px;border:1px solid var(--border);border-radius:3px;background:none;cursor:pointer;padding:0;}
#gp-preview{flex:1;height:18px;border-radius:3px;min-width:60px;}
.gp-label{font-family:'Cinzel',serif;font-size:7px;letter-spacing:.15em;color:rgba(201,169,110,.4);}
#gp-blend{width:100%;background:#0d0a1e;border:1px solid var(--border);color:var(--text);font-family:'EB Garamond',serif;font-size:10px;padding:4px 6px;border-radius:3px;margin-bottom:9px;}
#gp-opacity-row{display:flex;align-items:center;gap:8px;}
#gp-opacity-row input[type=range]{flex:1;accent-color:var(--gold);}
#gp-opacity-val{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);min-width:32px;text-align:right;}
.track-mini-btns{display:flex;flex-direction:column;gap:3px;}
.tmb{width:24px;height:16px;font-family:'Cinzel',serif;font-size:6.5px;letter-spacing:.05em;background:rgba(0,0,0,.4);border:1px solid var(--border);color:rgba(201,169,110,.35);cursor:pointer;border-radius:2px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.tmb:hover,.tmb.on{border-color:var(--gold);color:var(--gold);background:var(--gf);}
.tmb.muted{border-color:rgba(220,100,100,.4);color:rgba(220,100,100,.6);background:rgba(220,100,100,.06);}
.tmb.del:hover{border-color:rgba(220,80,80,.5);color:rgba(220,80,80,.7);}
.tmb.dup:hover{border-color:rgba(120,180,220,.5);color:rgba(140,200,240,.8);}

#step-ctx-menu{position:fixed;z-index:300;background:linear-gradient(150deg,#130f22,#09071a);border:1px solid rgba(201,169,110,.3);border-radius:6px;padding:6px;box-shadow:0 12px 40px rgba(0,0,0,.95);display:none;min-width:120px;}
#step-ctx-menu.show{display:block;}
.ctx-opt{padding:7px 12px;cursor:pointer;border-radius:3px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.13em;color:var(--gold);transition:background .12s;white-space:nowrap;}
.ctx-opt:hover{background:var(--gf);}
.ctx-opt.danger{color:rgba(220,120,120,.8);}
.steps-grid{display:flex;gap:3px;padding:7px 10px;align-items:center;}
.beat-gap{width:4px;flex-shrink:0;}

/* MELODY STEP CELLS */
.step-cell{width:var(--sw);min-width:var(--sw);height:var(--sh);border-radius:4px;border:1px solid rgba(201,169,110,.1);background:rgba(0,0,0,.45);position:relative;cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;padding:3px;overflow:hidden;flex-shrink:0;transition:transform .07s,border-color .1s,box-shadow .1s;user-select:none;}
.step-cell:hover{border-color:rgba(201,169,110,.32);background:rgba(201,169,110,.04);}
.step-cell.beat1{border-color:rgba(201,169,110,.2);}
.step-cell.filled{border-color:rgba(255,255,255,.18);}
.step-cell.filled:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.4);}
.step-cell.ph{box-shadow:inset 0 0 0 2px rgba(255,255,255,.55);transform:translateY(-2px);}
.step-cell.flash{transform:translateY(-5px)!important;border-color:rgba(255,255,255,.95)!important;box-shadow:0 0 18px var(--flash-col,#fff)!important;z-index:5;}
.cell-plus{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(201,169,110,.12);opacity:0;transition:opacity .15s;pointer-events:none;}
.step-cell:hover .cell-plus{opacity:1;}
.step-cell.filled .cell-plus{display:none;}
.cell-num{font-family:'Cinzel',serif;font-size:5.5px;opacity:.28;position:absolute;top:2px;right:3px;}
.cell-num.b{opacity:.55;color:var(--gold);}
.cell-name{font-family:'Cinzel',serif;font-size:6px;font-weight:600;line-height:1.2;position:relative;z-index:1;}
.cell-words{font-size:5.5px;font-style:italic;opacity:.65;line-height:1.2;position:relative;z-index:1;}
.cell-oct{font-family:'Cinzel',serif;font-size:8px;font-weight:700;position:absolute;bottom:2px;right:3px;opacity:.85;z-index:1;}

/* DRUM STEP CELLS */
.drum-cell{width:var(--sw);min-width:var(--sw);height:var(--dsh);border-radius:4px;border:1px solid rgba(201,169,110,.1);background:rgba(0,0,0,.45);position:relative;cursor:default;display:flex;flex-direction:column;padding:4px 3px 3px;overflow:hidden;flex-shrink:0;transition:border-color .1s,box-shadow .1s;user-select:none;}
.drum-cell.beat1{border-color:rgba(201,169,110,.18);}
.drum-cell.ph{box-shadow:inset 0 0 0 2px rgba(255,255,255,.5);}
.drum-cell.flash{box-shadow:0 0 14px rgba(255,200,100,.5)!important;border-color:rgba(255,200,100,.6)!important;}
.drum-cell-num{font-family:'Cinzel',serif;font-size:5.5px;opacity:.3;position:absolute;top:2px;right:3px;}
.drum-cell-num.b{opacity:.5;color:var(--gold);}
.drum-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;flex:1;margin-top:2px;}
.drum-btn{border-radius:2px;border:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.5);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:6px;color:rgba(255,255,255,.2);transition:all .08s;padding:0;}
.drum-btn:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.18);}
.drum-btn.on{background:var(--dc,#888);border-color:rgba(255,255,255,.5);color:#fff;box-shadow:0 0 5px var(--dc,#888);font-weight:700;}
.drum-btn.firing{filter:brightness(1.8);}

/* ADD TRACK */
#add-track-row{display:flex;align-items:center;padding:10px 14px;cursor:pointer;color:var(--dim);font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;border:none;background:none;transition:color .2s;width:100%;}
#add-track-row:hover{color:rgba(201,169,110,.5);}

/* INSTRUMENT PICKER */
#inst-picker{position:fixed;z-index:300;background:linear-gradient(150deg,#130f22,#09071a);border:1px solid rgba(201,169,110,.3);border-radius:6px;padding:8px;box-shadow:0 12px 40px rgba(0,0,0,.95);display:none;min-width:170px;}
#inst-picker.show{display:block;}
.inst-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-radius:3px;transition:background .12s;}
.inst-opt:hover{background:var(--gf);}
.inst-opt-pip{font-size:14px;}
.inst-opt-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;color:var(--gold);}

/* CARD PICKER PANEL */
#card-picker{position:fixed;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,#08061a,#120e20);border-top:1px solid rgba(201,169,110,.28);padding:10px 14px 14px;transform:translateY(100%);transition:transform .22s ease;max-height:190px;}
#card-picker.show{transform:translateY(0);}
#cp-head{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
#cp-suit-lbl{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;color:var(--gold);}
#cp-step-lbl{font-size:10px;color:rgba(201,169,110,.4);}
#cp-clear{font-family:'Cinzel',serif;font-size:8px;letter-spacing:.12em;background:transparent;border:1px solid rgba(220,100,100,.25);color:rgba(220,100,100,.6);padding:3px 9px;cursor:pointer;border-radius:2px;display:none;}
#cp-clear:hover{background:rgba(220,100,100,.08);}
#cp-close{margin-left:auto;font-family:'Cinzel',serif;font-size:8px;letter-spacing:.15em;background:transparent;border:1px solid var(--border);color:rgba(201,169,110,.5);padding:4px 10px;cursor:pointer;border-radius:2px;}
#cp-close:hover{color:var(--gold);}
#cp-cards{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;}
#cp-cards::-webkit-scrollbar{height:3px;}
#cp-cards::-webkit-scrollbar-thumb{background:rgba(201,169,110,.2);}
.cp-card{width:56px;min-width:56px;height:74px;border-radius:5px;border:2px solid rgba(255,255,255,.1);cursor:pointer;display:flex;flex-direction:column;justify-content:space-between;padding:4px;transition:transform .08s,border-color .1s,box-shadow .1s;flex-shrink:0;overflow:hidden;}
.cp-card:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.5);}
.cp-card.sel{border-color:#fff!important;transform:translateY(-5px);box-shadow:0 0 16px rgba(255,255,255,.25);}
.cp-card-name{font-family:'Cinzel',serif;font-size:6px;font-weight:600;line-height:1.2;}
.cp-card-words{font-size:5.5px;font-style:italic;opacity:.65;}

/* COLTRANE CIRCLE OVERLAY */
#circle-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(4,2,12,.92);display:none;align-items:center;justify-content:center;flex-direction:column;backdrop-filter:blur(8px);}
#circle-overlay.show{display:flex;}
#circle-canvas{border-radius:50%;cursor:crosshair;}
#circle-close{margin-top:16px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.2em;background:transparent;border:1px solid var(--border);color:rgba(201,169,110,.5);padding:6px 18px;cursor:pointer;border-radius:2px;}
#circle-close:hover{color:var(--gold);}
#circle-tooltip{position:fixed;pointer-events:none;background:rgba(10,6,22,.95);border:1px solid rgba(201,169,110,.3);border-radius:4px;padding:6px 10px;font-size:11px;color:var(--text);display:none;z-index:210;max-width:160px;}
</style>
</head>
<body>

<div id="bar">
  <h1>TRICKNOLOGIC · SEQUENCER</h1>
  <div class="sep"></div>
  <button id="play-btn" class="tb">▶ Play</button>
  <button id="stop-btn" class="tb">■ Stop</button>
  <div class="sep"></div>
  <button id="undo-btn" class="tb" disabled>↶ Undo</button>
  <button id="redo-btn" class="tb" disabled>↷ Redo</button>
  <div class="sep"></div>
  <div class="ctl-group">
    <span class="ctl-lbl">BPM</span>
    <button class="ctl-btn" id="bpm-dn">−</button>
    <span class="ctl-val" id="bpm-val">120</span>
    <button class="ctl-btn" id="bpm-up">+</button>
  </div>
  <div class="sep"></div>
  <div class="ctl-group">
    <span class="ctl-lbl">STEPS</span>
    <button class="step-preset on" data-steps="16">16</button>
    <button class="step-preset" data-steps="32">32</button>
    <button class="step-preset" data-steps="8">8</button>
    <button class="step-preset" data-steps="12">12</button>
    <button class="step-preset" data-steps="24">24</button>
  </div>
  <div class="sep"></div>
  <button id="circle-btn" class="tb">◎ Circle</button>
  <div id="bar-right">
    <span id="sb-status">☁ connecting…</span>
    <a href="tarot_piano.html" class="nav-link">🎹 Piano</a>
  </div>
</div>

<div id="tracks-outer">
  <div id="tracks-container"></div>
  <button id="add-track-row">+ Add Track</button>
</div>

<div id="inst-picker">
  <div class="inst-opt" data-suit="major"><span class="inst-opt-pip">✦</span><span class="inst-opt-label">Major Arcana</span></div>
  <div class="inst-opt" data-suit="wands"><span class="inst-opt-pip">🔥</span><span class="inst-opt-label">Wands · Fire</span></div>
  <div class="inst-opt" data-suit="cups"><span class="inst-opt-pip">🌊</span><span class="inst-opt-label">Cups · Water</span></div>
  <div class="inst-opt" data-suit="swords"><span class="inst-opt-pip">💨</span><span class="inst-opt-label">Swords · Air</span></div>
  <div class="inst-opt" data-suit="disks"><span class="inst-opt-pip">🌿</span><span class="inst-opt-label">Disks · Earth</span></div>
  <div class="inst-opt" data-suit="drums"><span class="inst-opt-pip">🥁</span><span class="inst-opt-label">Drums · Shadow</span></div>
</div>

<div id="card-picker">
  <div id="cp-head">
    <span id="cp-suit-lbl">—</span>
    <span id="cp-step-lbl"></span>
    <button id="cp-clear">✕ Clear step</button>
    <button id="cp-close">Close</button>
  </div>
  <div id="cp-cards"></div>
</div>

<div id="circle-overlay">
  <canvas id="circle-canvas" width="520" height="520"></canvas>
  <button id="circle-close">Close Circle</button>
</div>
<div id="circle-tooltip"></div>

<div id="step-ctx-menu"></div>

<div id="grad-popup">
  <div id="gp-head">
    <span id="gp-title">GRADIENT</span>
    <div class="gp-toggle" id="gp-toggle"><div class="gp-knob"></div></div>
  </div>
  <div id="gp-row">
    <input type="color" id="gp-start" value="#c9a96e"/>
    <div id="gp-preview"></div>
    <input type="color" id="gp-end" value="#ffffff"/>
  </div>
  <select id="gp-blend">
    <option value="normal">Normal</option>
    <option value="multiply">Multiply</option>
    <option value="screen">Screen</option>
    <option value="overlay">Overlay</option>
    <option value="hard-light">Hard Light</option>
    <option value="color-dodge">Color Dodge</option>
  </select>
  <div id="gp-opacity-row">
    <span class="gp-label">OPACITY</span>
    <input type="range" id="gp-opacity" min="0" max="100" value="30"/>
    <span id="gp-opacity-val">30%</span>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
// CARD DATA
// ════════════════════════════════════════════════════════
const BASE_CARDS=[
  {n:0,name:"The Fool",adj:"Curious",noun:"Endeavor",r:255,g:255,b:55,suit:"major",idx:0},
  {n:1,name:"The Magus",adj:"Inward",noun:"Vigor",r:255,g:255,b:0,suit:"major",idx:1},
  {n:2,name:"The Priestess",adj:"Hidden",noun:"Intelligence",r:42,g:42,b:255,suit:"major",idx:2},
  {n:3,name:"The Empress",adj:"Pregnant",noun:"Devotion",r:0,g:170,b:0,suit:"major",idx:3},
  {n:4,name:"The Emperor",adj:"Just",noun:"Absolution",r:255,g:0,b:0,suit:"major",idx:4},
  {n:5,name:"The Hierophant",adj:"Illuminated",noun:"Truth",r:255,g:102,b:0,suit:"major",idx:5},

// ── "Color of Sound" chart data (Melendez/Goss, flutopedia.com) ──
// Real chart: one octave F4→F5, frequency doubled ×40 into visible light.
// Red zone (hue≈0) holds 4 notes distinguished by brightness only.
const COS_RED_RAMP=[ // {v: brightness 0-1, f: freq Hz, note}
  {v:0.32,f:349.2,note:'F'},{v:0.45,f:370.0,note:'F#'},
  {v:0.70,f:392.0,note:'G'},{v:0.93,f:415.3,note:'G#'},
  {v:1.00,f:440.0,note:'A'}
];
const COS_SPECTRUM=[ // {h: hue degrees, f: freq Hz, note} — chart-accurate, hue 23–273
  {h:23, f:440.0,note:'A'}, {h:56, f:466.2,note:'A#'}, {h:84, f:493.9,note:'B'},
  {h:111,f:523.2,note:'C'}, {h:175,f:554.4,note:'C#'},{h:211,f:587.3,note:'D'},
  {h:241,f:622.2,note:'D#'},{h:258,f:659.3,note:'E'}, {h:273,f:698.5,note:'F'}
];
// hue 273–360: magenta/pink — NOT in the source chart (no real wavelength for
// non-spectral colors). Tricknologic's own bridge: glide one octave down,
// closing the loop back to red. This is an invented extension, not chart data.
function rgbToFreq(r,g,b){
  const rr=r/255,gg=g/255,bb=b/255;
  const mx=Math.max(rr,gg,bb),mn=Math.min(rr,gg,bb),d=mx-mn;
  let h=0,s=mx===0?0:d/mx,v=mx;
  if(d){if(mx===rr)h=((gg-bb)/d+6)%6;else if(mx===gg)h=(bb-rr)/d+2;else h=(rr-gg)/d+4;h*=60;}
  if(v<.04) return 174.6; // true black — one octave below F4 ("the silence before the cycle")
  if(s<.12) return 400+v*200; // achromatic/white — our own range, chart has no answer here
  if(h<23){ // red-zone: chart differentiates by brightness, not hue
    const vv=Math.max(0.32,Math.min(1,v));
    for(let i=0;i<COS_RED_RAMP.length-1;i++){
      const a=COS_RED_RAMP[i],b2=COS_RED_RAMP[i+1];
      if(vv>=a.v&&vv<=b2.v) return a.f+(vv-a.v)/(b2.v-a.v)*(b2.f-a.f);
    }
    return COS_RED_RAMP[0].f;
  }
  if(h<=273){ // real chart spectrum, hue-accurate
    for(let i=0;i<COS_SPECTRUM.length-1;i++){
      const a=COS_SPECTRUM[i],b2=COS_SPECTRUM[i+1];
      if(h>=a.h&&h<=b2.h) return a.f+(h-a.h)/(b2.h-a.h)*(b2.f-a.f);
    }
    return COS_SPECTRUM[COS_SPECTRUM.length-1].f;
  }
  // h in (273,360] — magenta bridge: glide down an octave back toward F4
  const t=(h-273)/(360-273);
  return 698.5+(349.2-698.5)*t;
}
function toCMYK(r,g,b){
  const rr=r/255,gg=g/255,bb=b/255,k=1-Math.max(rr,gg,bb);

function blendChannel(base,grd,blend,op){

    case 'multiply':  blended=(base/255)*(grd/255)*255; break;
    case 'screen':    blended=(1-(1-base/255)*(1-grd/255))*255; break;
    case 'overlay':   blended=base<128?(2*base/255*grd/255)*255:(1-2*(1-base/255)*(1-grd/255))*255; break;
    case 'hard-light':blended=grd<128?(2*grd/255*base/255)*255:(1-2*(1-grd/255)*(1-base/255))*255; break;
    case 'color-dodge':blended=grd===255?255:Math.min(255,(base/255)/(1-grd/255)*255); break;

  const sc=hexToRgb(track.grad.start),ec=hexToRgb(track.grad.end);
  const gr={r:Math.round(sc.r+(ec.r-sc.r)*t),g:Math.round(sc.g+(ec.g-sc.g)*t),b:Math.round(sc.b+(ec.b-sc.b)*t)};

  const filt=a.createBiquadFilter();filt.type='bandpass';filt.frequency.value=p.noiseF;filt.Q.value=p.noiseQ;
  const ng=a.createGain();ng.gain.setValueAtTime(0,t);
  ng.gain.linearRampToValueAtTime(vol*p.noiseVol,t+p.A);
  ng.gain.exponentialRampToValueAtTime(0.0001,t+p.A+p.D+p.R);
  noise.connect(filt);filt.connect(ng);ng.connect(a.destination);
  noise.start(t);noise.stop(t+p.A+p.D+p.R+0.06);
  // Tone sweep (kick/snare/perc)
  if(p.tone){
    const osc=a.createOscillator(),og=a.createGain();
    osc.frequency.setValueAtTime(p.fStart,t);
    osc.frequency.exponentialRampToValueAtTime(p.fEnd,t+p.D);
    og.gain.setValueAtTime(vol*(p.toneVol||0.5),t);
    og.gain.exponentialRampToValueAtTime(0.0001,t+p.D+p.R);
    osc.connect(og);og.connect(a.destination);osc.start(t);osc.stop(t+p.D+p.R+0.06);
  }
}

function previewCard(n,effColor=null){
  stopPreview();const col=effColor||cardColor(n);const card=BASE_CARDS.find(c=>c.n===n);if(!card) return;
  const a=getCtx();previewOsc=a.createOscillator();previewGain=a.createGain();
  previewOsc.type=WAVES[card.suit]||'sine';previewOsc.frequency.value=rgbToFreq(col.r,col.g,col.b);
  previewGain.gain.setValueAtTime(0,a.currentTime);previewGain.gain.linearRampToValueAtTime(0.16,a.currentTime+0.025);
  previewOsc.connect(previewGain);previewGain.connect(a.destination);previewOsc.start();
}
function stopPreview(){
  if(previewGain){const a=getCtx();
    previewGain.gain.cancelScheduledValues(a.currentTime);previewGain.gain.setValueAtTime(previewGain.gain.value,a.currentTime);
    previewGain.gain.linearRampToValueAtTime(0,a.currentTime+0.06);
    try{previewOsc.stop(a.currentTime+0.07);}catch(e){}previewOsc=null;previewGain=null;
  }
}

// SEQUENCER STATE
// ════════════════════════════════════════════════════════
let stepCount=16,bpm=120,playing=false,schedStep=0,nextNoteTime=0,schedTimer=null,rafHandle=null;
const stepQueue=[];
let tracks=[];
let activeNotes=[]; // [{n, r, g, b}] currently sounding melody cards w/ effective color (for circle)

function newTrack(suit=null){
  const isDrum=suit==='drums';
  return{
    id:'tr'+Date.now()+Math.random().toString(36).slice(2,4),
    suit,
    steps:isDrum?null:new Array(stepCount).fill(null),
    stepOctaves:isDrum?null:new Array(stepCount).fill(0),
    octave:0,
    grad:isDrum?null:defaultGrad(suit||'major'),
    drumSteps:isDrum?DRUM_SLOTS.map(()=>new Array(stepCount).fill(false)):null,
    muted:false,vol:0.8
  };
}

// ════════════════════════════════════════════════════════
// UNDO / REDO HISTORY
// ════════════════════════════════════════════════════════
let undoStack=[],redoStack=[];
const MAX_HISTORY=60;
let pendingGesture=null; // for slider/color-drag gestures (begin...commit)

function snapshotState(){return JSON.stringify({bpm,stepCount,tracks});}
function restoreSnapshot(json){
  const d=JSON.parse(json);
  bpm=d.bpm;stepCount=d.stepCount;tracks=d.tracks;
  document.getElementById('bpm-val').textContent=bpm;
  document.querySelectorAll('.step-preset').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.steps)===stepCount));
  render();saveState();
}
function pushHistory(){
  undoStack.push(snapshotState());
  if(undoStack.length>MAX_HISTORY) undoStack.shift();
  redoStack=[];
  updateHistoryButtons();
}
function beginGesture(){if(pendingGesture===null) pendingGesture=snapshotState();}
function commitGesture(){
  if(pendingGesture!==null){
    undoStack.push(pendingGesture);
    if(undoStack.length>MAX_HISTORY) undoStack.shift();
    redoStack=[];pendingGesture=null;
    updateHistoryButtons();
  }
}
function undo(){
  if(!undoStack.length) return;
  redoStack.push(snapshotState());
  restoreSnapshot(undoStack.pop());
  updateHistoryButtons();
}
function redo(){
  if(!redoStack.length) return;
  undoStack.push(snapshotState());
  restoreSnapshot(redoStack.pop());
  updateHistoryButtons();
}
function updateHistoryButtons(){
  document.getElementById('undo-btn').disabled=undoStack.length===0;
  document.getElementById('redo-btn').disabled=redoStack.length===0;
}
document.getElementById('undo-btn').addEventListener('click',undo);
document.getElementById('redo-btn').addEventListener('click',redo);
document.addEventListener('keydown',e=>{
  const tag=(e.target.tagName||'').toLowerCase();
  if(tag==='input'||tag==='select'||tag==='textarea') return;
  const mod=e.metaKey||e.ctrlKey;
  if(!mod) return;
  if(e.key.toLowerCase()==='z'&&!e.shiftKey){e.preventDefault();undo();}
  else if((e.key.toLowerCase()==='z'&&e.shiftKey)||e.key.toLowerCase()==='y'){e.preventDefault();redo();}
});

// ════════════════════════════════════════════════════════
// CLIPBOARD + STEP CONTEXT MENU (copy / paste / clear)
// ════════════════════════════════════════════════════════
let melodyClipboard=null; // {n, oct}
let drumClipboard=null;   // [bool,bool,...] per slot for one step
const ctxMenuEl=document.getElementById('step-ctx-menu');

function openStepCtxMenu(ti,si,e,kind){
  const track=tracks[ti];
  ctxMenuEl.innerHTML='';
  const hasNote=kind==='melody'?(track.steps[si]!==null&&track.steps[si]!==undefined):track.drumSteps.some(row=>row[si]);

  function addOpt(label,fn,danger){
    const o=document.createElement('div');o.className='ctx-opt'+(danger?' danger':'');o.textContent=label;
    o.addEventListener('click',()=>{fn();closeStepCtxMenu();});
    ctxMenuEl.appendChild(o);
  }

  if(kind==='melody'){
    if(hasNote) addOpt('Copy',()=>{melodyClipboard={n:track.steps[si],oct:(track.stepOctaves&&track.stepOctaves[si])||0};});
    if(melodyClipboard) addOpt('Paste',()=>{
      pushHistory();
      track.steps[si]=melodyClipboard.n;
      if(!track.stepOctaves) track.stepOctaves=new Array(stepCount).fill(0);
      track.stepOctaves[si]=melodyClipboard.oct;
      render();saveState();
    });
    if(hasNote) addOpt('Clear',()=>{
      pushHistory();track.steps[si]=null;
      if(track.stepOctaves) track.stepOctaves[si]=0;
      render();saveState();
    },true);
  } else {
    if(hasNote) addOpt('Copy',()=>{drumClipboard=DRUM_SLOTS.map((_,sli)=>track.drumSteps[sli][si]);});
    if(drumClipboard) addOpt('Paste',()=>{
      pushHistory();
      DRUM_SLOTS.forEach((_,sli)=>{track.drumSteps[sli][si]=drumClipboard[sli];});
      render();saveState();
    });
    if(hasNote) addOpt('Clear',()=>{
      pushHistory();
      DRUM_SLOTS.forEach((_,sli)=>{track.drumSteps[sli][si]=false;});
      render();saveState();
    },true);
  }
  if(!ctxMenuEl.children.length) return; // nothing to show
  const x=Math.min(e.clientX,window.innerWidth-140);
  const y=Math.min(e.clientY+4,window.innerHeight-140);
  ctxMenuEl.style.left=x+'px';ctxMenuEl.style.top=y+'px';
  ctxMenuEl.classList.add('show');
}
function closeStepCtxMenu(){ctxMenuEl.classList.remove('show');}
document.addEventListener('mousedown',e=>{
  if(ctxMenuEl.classList.contains('show')&&!ctxMenuEl.contains(e.target)) closeStepCtxMenu();
});
document.addEventListener('contextmenu',e=>{
  // close any open ctx menu if a new right-click happens outside a step cell
  if(!e.target.closest('.step-cell')&&!e.target.closest('.drum-cell')) closeStepCtxMenu();
});

// ════════════════════════════════════════════════════════
// SCHEDULER
// ════════════════════════════════════════════════════════
const LOOKAHEAD_MS=25,SCHEDULE_AHEAD_S=0.1,NOTE_FACTOR=0.75;

function startPlay(){
  const a=getCtx();playing=true;schedStep=0;nextNoteTime=a.currentTime+0.05;
  document.getElementById('play-btn').classList.add('playing');
  document.getElementById('play-btn').textContent='▶ Playing';
  scheduler();rafHandle=requestAnimationFrame(rafLoop);
}
function stopPlay(){
  playing=false;clearTimeout(schedTimer);cancelAnimationFrame(rafHandle);stepQueue.length=0;
  document.querySelectorAll('.step-cell.ph,.step-cell.flash,.drum-cell.ph,.drum-cell.flash').forEach(el=>el.classList.remove('ph','flash'));
  document.getElementById('play-btn').classList.remove('playing');document.getElementById('play-btn').textContent='▶ Play';
  activeNotes=[];
}
function scheduler(){
  const a=getCtx();
  while(nextNoteTime<a.currentTime+SCHEDULE_AHEAD_S){
    stepQueue.push({step:schedStep,time:nextNoteTime});
    fireStep(schedStep,nextNoteTime);
    nextNoteTime+=((60/bpm)/4);
    schedStep=(schedStep+1)%stepCount;
  }
  schedTimer=setTimeout(scheduler,LOOKAHEAD_MS);
}
function fireStep(step,t){
  const dur=((60/bpm)/4)*NOTE_FACTOR;
  tracks.forEach(track=>{
    if(track.muted||!track.suit) return;
    if(track.suit==='drums'&&track.drumSteps){
      DRUM_SLOTS.forEach((_,si)=>{
        if(track.drumSteps[si][step]) scheduleDrumNote(si,t,track.vol);
      });
    } else if(track.steps){
      const n=track.steps[step];
      if(n!==null&&n!==undefined){
        const octShift=(track.octave||0)+((track.stepOctaves&&track.stepOctaves[step])||0);
        const eff=getEffectiveColor(track,n);
        scheduleCardNote(n,t,dur,track.vol,octShift,eff);
      }
    }
  });
}
function rafLoop(){
  if(!playing) return;
  const now=audioCtx?audioCtx.currentTime:0;
  while(stepQueue.length&&stepQueue[0].time<=now){
    const{step}=stepQueue.shift();updatePlayhead(step);
  }
  rafHandle=requestAnimationFrame(rafLoop);
}
function updatePlayhead(step){
  document.querySelectorAll('.step-cell.ph,.drum-cell.ph').forEach(el=>el.classList.remove('ph'));
  activeNotes=[];
  document.querySelectorAll(`[data-step="${step}"]`).forEach(el=>{
    el.classList.add('ph');
    if(el.classList.contains('filled')){
      const col=el.dataset.col||'255,255,255';
      el.style.setProperty('--flash-col',`rgb(${col})`);
      el.classList.add('flash');
      setTimeout(()=>el.classList.remove('flash'),90);
      if(el.dataset.card_n){
        const[r,g,b]=col.split(',').map(Number);
        activeNotes.push({n:parseInt(el.dataset.card_n),r,g,b});
      }
    }
    if(el.classList.contains('drum-cell')){
      // Flash active drum buttons
      el.querySelectorAll('.drum-btn.on').forEach(btn=>{
        btn.classList.add('firing');setTimeout(()=>btn.classList.remove('firing'),80);
      });
      el.classList.add('flash');setTimeout(()=>el.classList.remove('flash'),80);
    }
  });
  if(circleVisible) drawCircle();
}

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
function render(){
  const c=document.getElementById('tracks-container');
  c.innerHTML='';
  tracks.forEach((t,i)=>c.appendChild(buildTrackRow(t,i)));
}

function buildTrackRow(track,ti){
  const info=track.suit?SUIT_INFO[track.suit]:null;
  const isDrum=track.suit==='drums';
  const row=document.createElement('div');row.className='track-row';

  // Header
  const hdr=document.createElement('div');hdr.className='track-header';
  const pip=document.createElement('span');pip.className='track-pip';pip.textContent=info?info.pip:'○';
  const inf=document.createElement('div');inf.className='track-info';
  if(info){
    const sb=document.createElement('button');sb.className='track-suit-btn';sb.textContent=info.label;
    sb.style.color=info.color;sb.addEventListener('click',e=>openInstPicker(ti,e));inf.appendChild(sb);
  } else {
    const ul=document.createElement('span');ul.className='track-unassigned';ul.textContent='Click to assign';
    ul.addEventListener('click',e=>openInstPicker(ti,e));inf.appendChild(ul);
  }
  const vol=document.createElement('input');vol.type='range';vol.className='track-vol';
  vol.min=0;vol.max=1;vol.step=0.05;vol.value=track.vol;
  vol.addEventListener('input',e=>{beginGesture();track.vol=parseFloat(e.target.value);});
  vol.addEventListener('change',commitGesture);
  inf.appendChild(vol);
  if(!isDrum&&track.suit){
    const octRow=document.createElement('div');octRow.className='oct-row';
    const octLbl=document.createElement('span');octLbl.className='oct-lbl';octLbl.textContent='OCT';
    const octDn=document.createElement('button');octDn.className='oct-btn';octDn.textContent='−';
    const octVal=document.createElement('span');octVal.className='oct-val';
    octVal.textContent=(track.octave>0?'+':'')+track.octave;
    const octUp=document.createElement('button');octUp.className='oct-btn';octUp.textContent='+';
    octDn.addEventListener('click',()=>{pushHistory();track.octave=Math.max(-2,(track.octave||0)-1);octVal.textContent=(track.octave>0?'+':'')+track.octave;saveState();});
    octUp.addEventListener('click',()=>{pushHistory();track.octave=Math.min(2,(track.octave||0)+1);octVal.textContent=(track.octave>0?'+':'')+track.octave;saveState();});
    octRow.appendChild(octLbl);octRow.appendChild(octDn);octRow.appendChild(octVal);octRow.appendChild(octUp);

    const gradBtn=document.createElement('button');
    gradBtn.className='grad-btn'+(track.grad&&track.grad.on?' on':'');
    gradBtn.title='Gradient';
    if(track.grad) gradBtn.style.background=`linear-gradient(to right, ${track.grad.start}, ${track.grad.end})`;
    gradBtn.addEventListener('click',e=>{e.stopPropagation();openGradPopup(ti,e);});
    octRow.appendChild(gradBtn);

    inf.appendChild(octRow);
  }
  const btns=document.createElement('div');btns.className='track-mini-btns';
  const mb=document.createElement('button');mb.className='tmb'+(track.muted?' muted':'');mb.textContent='M';
  mb.title='Mute';mb.addEventListener('click',()=>{pushHistory();track.muted=!track.muted;render();saveState();});
  const upb=document.createElement('button');upb.className='tmb dup';upb.textContent='⧉';upb.title='Duplicate track';
  upb.addEventListener('click',()=>{
    pushHistory();
    const clone=JSON.parse(JSON.stringify(track));
    clone.id='tr'+Date.now()+Math.random().toString(36).slice(2,4);
    tracks.splice(ti+1,0,clone);
    render();saveState();
  });
  const db=document.createElement('button');db.className='tmb del';db.textContent='✕';db.title='Remove track';
  db.addEventListener('click',()=>{if(confirm('Remove track?')){pushHistory();tracks.splice(ti,1);render();saveState();}});
  btns.appendChild(mb);btns.appendChild(upb);btns.appendChild(db);
  hdr.appendChild(pip);hdr.appendChild(inf);hdr.appendChild(btns);
  row.appendChild(hdr);

  // Steps
  const grid=document.createElement('div');grid.className='steps-grid';
  for(let si=0;si<stepCount;si++){
    if(si>0&&si%4===0){const gap=document.createElement('div');gap.className='beat-gap';grid.appendChild(gap);}
    grid.appendChild(isDrum?buildDrumCell(track,ti,si):buildMelodyCell(track,ti,si));
  }
  row.appendChild(grid);
  return row;
}

function buildMelodyCell(track,ti,si){
  const el=document.createElement('div');
  el.className='step-cell'+(si%4===0?' beat1':'');
  el.dataset.step=si;
  const numEl=document.createElement('span');numEl.className='cell-num'+(si%4===0?' b':'');numEl.textContent=si+1;el.appendChild(numEl);
  const plus=document.createElement('div');plus.className='cell-plus';plus.textContent='+';el.appendChild(plus);
  const n=track.steps[si];
  if(n!==null&&n!==undefined){
    const card=BASE_CARDS.find(c=>c.n===n);
    if(card){
      const col=getEffectiveColor(track,n);
      const fg=`rgb(${255-col.r},${255-col.g},${255-col.b})`;
      el.style.background=`rgb(${col.r},${col.g},${col.b})`;
      el.style.color=fg;el.style.boxShadow=`0 2px 10px rgba(${col.r},${col.g},${col.b},.3)`;
      el.dataset.col=`${col.r},${col.g},${col.b}`;el.dataset.card_n=n;
      el.classList.add('filled');
      const nm=document.createElement('div');nm.className='cell-name';nm.style.color=fg;nm.textContent=card.name;
      const wd=document.createElement('div');wd.className='cell-words';wd.style.color=fg;wd.textContent=`${card.adj}·${card.noun}`;
      el.appendChild(nm);el.appendChild(wd);

      const so=(track.stepOctaves&&track.stepOctaves[si])||0;
      if(so!==0){
        const badge=document.createElement('span');badge.className='cell-oct';
        badge.style.color=fg;badge.textContent=(so>0?'+':'')+so;
        badge.title='Click to reset octave';
        badge.addEventListener('click',e=>{
          e.stopPropagation();pushHistory();
          track.stepOctaves[si]=0;render();saveState();
        });
        el.appendChild(badge);
      }
    }
  }
  el.addEventListener('click',()=>{if(!track.suit){openInstPicker(ti,{clientX:100,clientY:200});return;}openCardPicker(ti,si);});
  el.addEventListener('contextmenu',e=>{e.preventDefault();openStepCtxMenu(ti,si,e,'melody');});
  let lastWheelAt=0;
  el.addEventListener('wheel',e=>{
    if(track.steps[si]===null||track.steps[si]===undefined) return;
    e.preventDefault();
    const now=Date.now();
    if(now-lastWheelAt<160) return; // throttle: one notch per gesture-tick
    lastWheelAt=now;
    pushHistory();
    if(!track.stepOctaves) track.stepOctaves=new Array(stepCount).fill(0);
    const cur=track.stepOctaves[si]||0;
    const next=e.deltaY<0?Math.min(2,cur+1):Math.max(-2,cur-1);
    track.stepOctaves[si]=next;
    render();saveState();
  },{passive:false});
  return el;
}

function buildDrumCell(track,ti,si){
  const el=document.createElement('div');
  el.className='drum-cell'+(si%4===0?' beat1':'');
  el.dataset.step=si;
  const numEl=document.createElement('span');numEl.className='drum-cell-num'+(si%4===0?' b':'');numEl.textContent=si+1;el.appendChild(numEl);
  const grid=document.createElement('div');grid.className='drum-grid';
  DRUM_SLOTS.forEach((slot,sli)=>{
    const active=track.drumSteps[sli][si];
    const btn=document.createElement('button');btn.className='drum-btn'+(active?' on':'');
    btn.textContent=slot.label;btn.title=slot.title;
    if(active) btn.style.setProperty('--dc',slot.color);
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      pushHistory();
      track.drumSteps[sli][si]=!track.drumSteps[sli][si];
      btn.classList.toggle('on');
      if(track.drumSteps[sli][si]) btn.style.setProperty('--dc',slot.color);
      // Immediate audio preview
      if(track.drumSteps[sli][si]){const a=getCtx();scheduleDrumNote(sli,a.currentTime,track.vol);}
      // Update hasAny class on cell
      const hasAny=track.drumSteps.some(row=>row[si]);
      el.classList.toggle('filled',hasAny);
      saveState();
    });
    grid.appendChild(btn);
  });
  const hasAny=track.drumSteps.some(row=>row[si]);
  if(hasAny) el.classList.add('filled');
  el.appendChild(grid);
  el.addEventListener('contextmenu',e=>{e.preventDefault();openStepCtxMenu(ti,si,e,'drum');});
  return el;
}

const instPicker=document.getElementById('inst-picker');

  instPickerTi=ti;
  const x=Math.min(e.clientX,window.innerWidth-190),y=Math.min(e.clientY+8,window.innerHeight-280);
  instPicker.style.left=x+'px';instPicker.style.top=y+'px';

instPicker.querySelectorAll('.inst-opt').forEach(opt=>{
  opt.addEventListener('click',()=>{
    if(instPickerTi===null) return;
    pushHistory();
    const suit=opt.dataset.suit;
    const wasDrum=tracks[instPickerTi].suit==='drums';
    const isDrum=suit==='drums';
    tracks[instPickerTi].suit=suit;
    if(isDrum&&!wasDrum){
      tracks[instPickerTi].steps=null;
      tracks[instPickerTi].stepOctaves=null;
      tracks[instPickerTi].grad=null;
      tracks[instPickerTi].drumSteps=DRUM_SLOTS.map(()=>new Array(stepCount).fill(false));

      tracks[instPickerTi].steps=new Array(stepCount).fill(null);

      tracks[instPickerTi].drumSteps=null;
    } else if(!isDrum&&!tracks[instPickerTi].grad){
      tracks[instPickerTi].grad=defaultGrad(suit);

      // suit changed between melody suits — refresh gradient defaults for new suit but keep on/off+settings shape
      tracks[instPickerTi].grad=defaultGrad(suit);

const cpEl=document.getElementById('card-picker');
let pickerTi=null,pickerSi=null;

function openCardPicker(ti,si){
  pickerTi=ti;pickerSi=si;
  const track=tracks[ti];const info=SUIT_INFO[track.suit];
  document.getElementById('cp-suit-lbl').textContent=`${info.pip} ${info.label}`;
  document.getElementById('cp-suit-lbl').style.color=info.color;
  document.getElementById('cp-step-lbl').textContent=`Step ${si+1}`;
  const clearBtn=document.getElementById('cp-clear');
  clearBtn.style.display=(track.steps[si]!==null&&track.steps[si]!==undefined)?'block':'none';
  const cpCards=document.getElementById('cp-cards');cpCards.innerHTML='';
  const currentN=track.steps[si];
  BASE_CARDS.filter(c=>c.suit===track.suit).forEach(card=>{
    const col=getEffectiveColor(track,card.n);
    const fg=`rgb(${255-col.r},${255-col.g},${255-col.b})`;
    const chip=document.createElement('div');
    chip.className='cp-card'+(card.n===currentN?' sel':'');
    chip.style.background=`rgb(${col.r},${col.g},${col.b})`;chip.style.color=fg;
    chip.style.borderColor=card.n===currentN?'#fff':'rgba(255,255,255,.1)';
    const nm=document.createElement('div');nm.className='cp-card-name';nm.style.color=fg;nm.textContent=card.name;
    const wd=document.createElement('div');wd.className='cp-card-words';wd.style.color=fg;wd.textContent=`${card.adj}·${card.noun}`;
    chip.appendChild(nm);chip.appendChild(wd);
    chip.addEventListener('mouseenter',()=>previewCard(card.n,col));
    chip.addEventListener('mouseleave',()=>stopPreview());
    chip.addEventListener('click',()=>{
      pushHistory();
      tracks[pickerTi].steps[pickerSi]=card.n;
      closeCardPicker();render();saveState();
      previewCard(card.n,col);setTimeout(stopPreview,300);
    });
    cpCards.appendChild(chip);
  });
  cpEl.classList.add('show');
  const sel=cpCards.querySelector('.sel');
  if(sel) setTimeout(()=>sel.scrollIntoView({behavior:'smooth',inline:'center'}),50);
}
function closeCardPicker(){stopPreview();cpEl.classList.remove('show');pickerTi=null;pickerSi=null;}
document.getElementById('cp-close').addEventListener('click',closeCardPicker);
document.getElementById('cp-clear').addEventListener('click',()=>{
  if(pickerTi!==null&&pickerSi!==null){pushHistory();tracks[pickerTi].steps[pickerSi]=null;closeCardPicker();render();saveState();}
});

// ════════════════════════════════════════════════════════
// COLTRANE CIRCLE
// ════════════════════════════════════════════════════════
let circleVisible=false;
let circleCardHits=[]; // precomputed card positions

const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
// Real "Color of Sound" hue positions (Melendez/Goss) — F4 through F5, one octave.
// The 4 red-zone notes share hue 0, differentiated by brightness in the source chart;
// nudged a few degrees apart here purely so their labels don't overlap.
const REAL_NOTE_RING=[
  {note:'F', h:0},  {note:'F#',h:4},  {note:'G', h:8},  {note:'G#',h:12},
  {note:'A', h:23}, {note:'A#',h:56}, {note:'B', h:84}, {note:'C', h:111},
  {note:'C#',h:175},{note:'D', h:211},{note:'D#',h:241},{note:'E', h:258},
  {note:'F', h:273}
];

function rgbToHue(r,g,b){
  const rr=r/255,gg=g/255,bb=b/255;
  const mx=Math.max(rr,gg,bb),mn=Math.min(rr,gg,bb),d=mx-mn;
  if(d===0) return -1; // achromatic
  let h=0;
  if(mx===rr) h=((gg-bb)/d+6)%6;
  else if(mx===gg) h=(bb-rr)/d+2;
  else h=(rr-gg)/d+4;
  return h*60;
}
function rgbSaturation(r,g,b){
  const mx=Math.max(r,g,b)/255,mn=Math.min(r,g,b)/255;
  return mx===0?0:(mx-mn)/mx;
}
function rgbValue(r,g,b){return Math.max(r,g,b)/255;}

const CIRCLE_CX=260,CIRCLE_CY=260,CIRCLE_OUTER_R=195,CIRCLE_INNER_R=140,CIRCLE_DOT_R=7;
const SUIT_R_OFFSET={major:0,wands:8,cups:-8,swords:4,disks:-4};

// Shared position formula — used for both the static 78-card layout AND
// for repositioning a note live by its EFFECTIVE (gradient-blended) color.
function computeCirclePos(r,g,b,suit){
  const h=rgbToHue(r,g,b),s=rgbSaturation(r,g,b),v=rgbValue(r,g,b);
  const dim=(s<0.15||v<0.1);
  const hh=h<0?0:h;
  const angle=(hh/360)*Math.PI*2-Math.PI/2;
  const rad=dim?CIRCLE_INNER_R:(CIRCLE_OUTER_R+(SUIT_R_OFFSET[suit]||0));
  return{x:CIRCLE_CX+Math.cos(angle)*rad,y:CIRCLE_CY+Math.sin(angle)*rad,dim};
}

function buildCircleLayout(){
  circleCardHits=[];
  const vivid=[],dim=[];
  BASE_CARDS.forEach(card=>{
    const h=rgbToHue(card.r,card.g,card.b);
    const s=rgbSaturation(card.r,card.g,card.b);
    const v=rgbValue(card.r,card.g,card.b);
    if(s<0.15||v<0.1){dim.push({...card,h:h<0?0:h,s,v});}
    else{vivid.push({...card,h,s,v});}
  });
  vivid.forEach(card=>{
    const pos=computeCirclePos(card.r,card.g,card.b,card.suit);
    circleCardHits.push({n:card.n,x:pos.x,y:pos.y,r:CIRCLE_DOT_R,card});
  });
  // Inner ring (dim/achromatic) spread evenly since hue is undefined for these
  dim.forEach((card,i)=>{
    const frac=i/Math.max(dim.length,1);
    const angle=frac*Math.PI*2-Math.PI/2;
    const x=CIRCLE_CX+Math.cos(angle)*CIRCLE_INNER_R;
    const y=CIRCLE_CY+Math.sin(angle)*CIRCLE_INNER_R;
    circleCardHits.push({n:card.n,x,y,r:CIRCLE_DOT_R,card});
  });
}

function drawCircle(){
  const canvas=document.getElementById('circle-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2;
  ctx.clearRect(0,0,W,H);

  // Background
  const bg=ctx.createRadialGradient(cx,cy,20,cx,cy,220);
  bg.addColorStop(0,'rgba(18,12,36,.95)');bg.addColorStop(1,'rgba(4,2,14,.95)');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

  // Outer reference ring (chromatic notes)
  ctx.save();
  ctx.strokeStyle='rgba(201,169,110,.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,218,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,162,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,110,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Chromatic note labels — REAL hue positions from the Color of Sound chart.
  // The four red-zone notes (F,F#,G,G#) share hue≈0; fanned outward by radius
  // since the source chart differentiates them by brightness, not hue.
  let redFanCount=0;
  REAL_NOTE_RING.forEach(({note,h})=>{
    const angle=(h/360)*Math.PI*2-Math.PI/2;
    const isRedFan=h<=12;
    const labelR=isRedFan?(222+redFanCount*15):228;
    if(isRedFan) redFanCount++;
    const x=cx+Math.cos(angle)*labelR;
    const y=cy+Math.sin(angle)*labelR;
    ctx.save();
    ctx.font='bold 11px Cinzel, serif';ctx.fillStyle='rgba(201,169,110,.35)';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(note,x,y);
    ctx.restore();
    const tx1=cx+Math.cos(angle)*218,ty1=cy+Math.sin(angle)*218;
    const tx2=cx+Math.cos(angle)*210,ty2=cy+Math.sin(angle)*210;
    ctx.beginPath();ctx.moveTo(tx1,ty1);ctx.lineTo(tx2,ty2);
    ctx.strokeStyle='rgba(201,169,110,.2)';ctx.lineWidth=1.5;ctx.stroke();
  });

  // Magenta bridge zone (hue 273–360°) — not in the source chart, marked distinctly
  ctx.save();
  ctx.beginPath();
  ctx.setLineDash([3,4]);
  ctx.arc(cx,cy,218,(273/360)*Math.PI*2-Math.PI/2,(360/360)*Math.PI*2-Math.PI/2);
  ctx.strokeStyle='rgba(180,120,200,.35)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.setLineDash([]);
  const midAngle=((273+360)/2/360)*Math.PI*2-Math.PI/2;
  ctx.translate(cx+Math.cos(midAngle)*242,cy+Math.sin(midAngle)*242);
  ctx.rotate(midAngle+Math.PI/2);
  ctx.font='7px Cinzel, serif';ctx.fillStyle='rgba(180,120,200,.55)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TRICKNOLOGIC BRIDGE',0,0);
  ctx.restore();

  // Spokes
  for(let a=0;a<12;a++){
    const ang=(a/12)*Math.PI*2-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(ang)*215,cy+Math.sin(ang)*215);
    ctx.strokeStyle='rgba(201,169,110,.04)';ctx.lineWidth=1;ctx.stroke();
  }

  // Compute DYNAMIC positions for active notes — based on their EFFECTIVE
  // (gradient-blended) color, not their card's static base position.
  const dynPos=new Map(); // n -> {x,y,r,g,b}
  activeNotes.forEach(an=>{
    const card=BASE_CARDS.find(c=>c.n===an.n);
    if(!card) return;
    const pos=computeCirclePos(an.r,an.g,an.b,card.suit);
    dynPos.set(an.n,{x:pos.x,y:pos.y,r:an.r,g:an.g,b:an.b});
  });

  // Tether lines: static (base card) position → dynamic (effective) position,
  // visible only when a gradient has actually shifted the color meaningfully.
  dynPos.forEach((dp,n)=>{
    const staticHit=circleCardHits.find(h=>h.n===n);
    if(!staticHit) return;
    const dist=Math.hypot(dp.x-staticHit.x,dp.y-staticHit.y);
    if(dist>4){
      ctx.beginPath();ctx.moveTo(staticHit.x,staticHit.y);ctx.lineTo(dp.x,dp.y);
      ctx.strokeStyle=`rgba(${dp.r},${dp.g},${dp.b},.35)`;ctx.lineWidth=1;ctx.stroke();
      // faint marker at the original/static spot for reference
      ctx.beginPath();ctx.arc(staticHit.x,staticHit.y,3,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${dp.r},${dp.g},${dp.b},.4)`;ctx.lineWidth=1;ctx.stroke();
    }
  });

  // Lines between simultaneously playing cards (chords) — dynamic positions
  const dynList=[...dynPos.entries()];
  if(dynList.length>1){
    for(let i=0;i<dynList.length;i++){
      for(let j=i+1;j<dynList.length;j++){
        const[,a]=dynList[i],[,b]=dynList[j];
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(${a.r},${a.g},${a.b},.25)`;ctx.lineWidth=1;ctx.stroke();
      }
    }
  }

  // Draw all 78 static card dots (faint reference layer)
  circleCardHits.forEach(hit=>{
    const{card,x,y,r,n}=hit;
    const isActiveHere=dynPos.has(n)&&Math.hypot(dynPos.get(n).x-x,dynPos.get(n).y-y)<=4;
    const col=isActiveHere?dynPos.get(n):cardColor(n);
    if(isActiveHere){
      const grd=ctx.createRadialGradient(x,y,0,x,y,r*3.5);
      grd.addColorStop(0,`rgba(${col.r},${col.g},${col.b},0.6)`);
      grd.addColorStop(1,`rgba(${col.r},${col.g},${col.b},0)`);
      ctx.beginPath();ctx.arc(x,y,r*3.5,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    }
    ctx.beginPath();ctx.arc(x,y,isActiveHere?r*1.6:r,0,Math.PI*2);
    ctx.fillStyle=`rgb(${col.r},${col.g},${col.b})`;ctx.fill();
    ctx.strokeStyle=isActiveHere?'rgba(255,255,255,.9)':`rgba(255,255,255,${card.suit==='major'?0.25:0.1})`;
    ctx.lineWidth=isActiveHere?1.5:0.8;ctx.stroke();
  });

  // Draw shifted active dots (gradient-displaced) on top, at their dynamic spot
  dynPos.forEach((dp,n)=>{
    const staticHit=circleCardHits.find(h=>h.n===n);
    if(staticHit&&Math.hypot(dp.x-staticHit.x,dp.y-staticHit.y)<=4) return; // not shifted, already drawn above
    const grd=ctx.createRadialGradient(dp.x,dp.y,0,dp.x,dp.y,CIRCLE_DOT_R*3.5);
    grd.addColorStop(0,`rgba(${dp.r},${dp.g},${dp.b},0.6)`);
    grd.addColorStop(1,`rgba(${dp.r},${dp.g},${dp.b},0)`);
    ctx.beginPath();ctx.arc(dp.x,dp.y,CIRCLE_DOT_R*3.5,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
    ctx.beginPath();ctx.arc(dp.x,dp.y,CIRCLE_DOT_R*1.6,0,Math.PI*2);
    ctx.fillStyle=`rgb(${dp.r},${dp.g},${dp.b})`;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=1.5;ctx.stroke();
  });

  // Center label
  ctx.font='8px Cinzel,serif';ctx.fillStyle='rgba(201,169,110,.35)';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('TRICKNOLOGIC',cx,cy-8);
  ctx.fillText('CIRCLE',cx,cy+6);
}

// Circle mouse hover
document.getElementById('circle-canvas').addEventListener('mousemove',e=>{
  const canvas=document.getElementById('circle-canvas');
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const tip=document.getElementById('circle-tooltip');
  let found=null;
  for(const hit of circleCardHits){
    const dx=mx-hit.x,dy=my-hit.y;
    if(dx*dx+dy*dy<(hit.r+6)*(hit.r+6)){found=hit;break;}
  }
  if(found){
    const card=found.card;
    const col=cardColor(found.n);
    tip.innerHTML=`<b style="color:rgb(${col.r},${col.g},${col.b})">${card.name}</b><br><i>${card.adj}·${card.noun}</i><br><span style="opacity:.5;font-size:9px">${card.suit} · rgb(${col.r},${col.g},${col.b})</span>`;
    tip.style.display='block';tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-10)+'px';
  } else {
    tip.style.display='none';
  }
});
document.getElementById('circle-canvas').addEventListener('mouseleave',()=>{
  document.getElementById('circle-tooltip').style.display='none';
});

document.getElementById('circle-btn').addEventListener('click',()=>{
  circleVisible=!circleVisible;
  document.getElementById('circle-overlay').classList.toggle('show',circleVisible);
  document.getElementById('circle-btn').classList.toggle('active',circleVisible);
  if(circleVisible) drawCircle();
});
document.getElementById('circle-close').addEventListener('click',()=>{
  circleVisible=false;
  document.getElementById('circle-overlay').classList.remove('show');
  document.getElementById('circle-btn').classList.remove('active');
});

// ════════════════════════════════════════════════════════
// TRANSPORT
// ════════════════════════════════════════════════════════
document.getElementById('play-btn').addEventListener('click',()=>{if(playing)stopPlay();else startPlay();});
document.getElementById('stop-btn').addEventListener('click',()=>{stopPlay();schedStep=0;});
function setBpm(v){pushHistory();bpm=Math.max(40,Math.min(300,v));document.getElementById('bpm-val').textContent=bpm;saveState();}
document.getElementById('bpm-dn').addEventListener('click',()=>setBpm(bpm-5));
document.getElementById('bpm-up').addEventListener('click',()=>setBpm(bpm+5));
document.querySelectorAll('.step-preset').forEach(btn=>{
  btn.addEventListener('click',()=>{
    pushHistory();
    stepCount=parseInt(btn.dataset.steps);
    tracks.forEach(t=>{
      if(t.steps){while(t.steps.length<stepCount)t.steps.push(null);t.steps=t.steps.slice(0,stepCount);}
      if(t.stepOctaves){while(t.stepOctaves.length<stepCount)t.stepOctaves.push(0);t.stepOctaves=t.stepOctaves.slice(0,stepCount);}
      if(t.drumSteps){t.drumSteps=t.drumSteps.map(row=>{while(row.length<stepCount)row.push(false);return row.slice(0,stepCount);});}
    });
    document.querySelectorAll('.step-preset').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');stopPlay();render();saveState();
  });
});
document.getElementById('add-track-row').addEventListener('click',()=>{
  if(tracks.length>=8) return;pushHistory();tracks.push(newTrack());render();saveState();
});

// ════════════════════════════════════════════════════════
// SAVE / LOAD
// ════════════════════════════════════════════════════════
const SAVE_KEY='trico_seq_v4';
function saveState(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({bpm,stepCount,tracks:tracks.map(t=>({
    id:t.id,suit:t.suit,steps:t.steps,stepOctaves:t.stepOctaves,octave:t.octave,grad:t.grad,drumSteps:t.drumSteps,muted:t.muted,vol:t.vol
  }))
  }));}catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem('trico_seq_v3')||localStorage.getItem('trico_seq_v2')||localStorage.getItem('trico_seq_v1');
    if(!raw) return false;
    const d=JSON.parse(raw);
    bpm=d.bpm||120;stepCount=d.stepCount||16;
    setBpm(bpm);
    document.querySelectorAll('.step-preset').forEach(b=>b.classList.toggle('on',parseInt(b.dataset.steps)===stepCount));
    tracks=(d.tracks||[]).map(t=>{
      const isDrum=t.suit==='drums';
      const steps=isDrum?null:(t.steps||[]).slice(0,stepCount).concat(new Array(Math.max(0,stepCount-(t.steps||[]).length)).fill(null));
      const stepOctaves=isDrum?null:(t.stepOctaves||[]).slice(0,stepCount).concat(new Array(Math.max(0,stepCount-(t.stepOctaves||[]).length)).fill(0));
      const grad=isDrum?null:(t.grad||defaultGrad(t.suit||'major'));
      const drumSteps=isDrum?(t.drumSteps||DRUM_SLOTS.map(()=>[])).map(row=>{
        const r=(row||[]).slice(0,stepCount);while(r.length<stepCount)r.push(false);return r;
      }):null;
      return{id:t.id,suit:t.suit||null,steps,stepOctaves,octave:t.octave||0,grad,drumSteps,muted:t.muted||false,vol:t.vol??0.8};
    });
    return true;
  }catch(e){return false;}
}

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
async function init(){
  await loadSupabaseCards();
  const had=loadState();
  if(!had) tracks=[newTrack(),newTrack(),newTrack(),newTrack()];
  buildCircleLayout();
  render();
}
init();
</script>
